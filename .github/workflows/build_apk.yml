name: Production APK Build Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java Development Kit
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean App Scaffolding Setup
        run: |
          rm -rf android
          flutter create . --platforms=android

      - name: Fetch Remote Package Dependencies
        run: flutter pub get

      - name: Generate Core Database Models
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile Optimized Release APK
        run: flutter build apk --release

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Printiverse-ReceiptManager
          path: build/app/outputs/flutter-apk/app-release.apk

