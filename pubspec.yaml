name: receipt_generator
description: Manager Backend + Cashier Frontend receipt app for phones/tablets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  provider: ^6.1.2

  # --- Local Persistent Storage (settings, presets, immutable receipt history) ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # --- Hardware: 58mm Bluetooth Thermal Printing ---
  flutter_bluetooth_serial: ^0.4.0
  esc_pos_utils_plus: ^2.0.4   # builds ESC/POS byte commands for the printer
  permission_handler: ^11.4.0  # runtime Bluetooth permissions

  # --- Sharing receipt image (WhatsApp / generic share sheet) ---
  share_plus: ^13.2.0
  screenshot: ^3.0.0           # render receipt widget -> PNG for sharing/printing
  url_launcher: ^6.3.1         # deep-link into a specific WhatsApp chat thread

  # --- History Export ---
  excel: ^4.0.6
  csv: ^6.0.0

  # --- Utility ---
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5               # hashing manager password, never store plaintext

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true